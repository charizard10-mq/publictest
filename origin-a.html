<!DOCTYPE html>
<html>
<body>
  <h1>Origin A (GitHub): MessageChannel</h1>
  <script>
    const channel = new MessageChannel();
    const port1 = channel.port1;
    const port2 = channel.port2;

    // Listen on port1 (same origin)
    port1.onmessage = (e) => console.log("[GitHub] Received:", e.data);

    // Send a test message to itself
    port1.postMessage("Hello from GitHub!");

    // Expose port2 globally (for demonstration – this is NOT secure!)
    window.port2FromGitHub = port2; 
  </script>
</body>
</html>
