<!DOCTYPE html>
<html>
<body>
  <h1>Testing SOP Block</h1>
  <script>
    // Attempt to load a script from AWS origin (UNAUTHORIZED)
    const script = document.createElement('script');
    script.src = 'https://localhost.my.gamma.us-west-2.nonprod.connect.aws.a2z.com:8080/harness/some-script.js'; // Replace with actual path
    script.onload = () => console.log('Script loaded (THIS SHOULD NOT HAPPEN)');
    script.onerror = (err) => console.error('Script blocked by SOP:', err);
    document.body.appendChild(script);
  </script>
</body>
</html>
